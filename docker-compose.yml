version: '3.8'

services:
  # Nginx Load Balancer
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./uploads:/var/www/uploads
    depends_on:
      - app1
      - app2
      - app3
      - app4
    restart: unless-stopped
    networks:
      - careerconnect

  # Application Instances
  app1:
    build: .
    environment:
      - NODE_ENV=production
      - PORT=3000
      - REDIS_URL=redis://redis:6379
      - MONGODB_URI=mongodb://mongo:27017/careerconnect
    depends_on:
      - redis
      - mongo
    restart: unless-stopped
    networks:
      - careerconnect
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G

  app2:
    build: .
    environment:
      - NODE_ENV=production
      - PORT=3000
      - REDIS_URL=redis://redis:6379
      - MONGODB_URI=mongodb://mongo:27017/careerconnect
    depends_on:
      - redis
      - mongo
    restart: unless-stopped
    networks:
      - careerconnect
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G

  app3:
    build: .
    environment:
      - NODE_ENV=production
      - PORT=3000
      - REDIS_URL=redis://redis:6379
      - MONGODB_URI=mongodb://mongo:27017/careerconnect
    depends_on:
      - redis
      - mongo
    restart: unless-stopped
    networks:
      - careerconnect
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G

  app4:
    build: .
    environment:
      - NODE_ENV=production
      - PORT=3000
      - REDIS_URL=redis://redis:6379
      - MONGODB_URI=mongodb://mongo:27017/careerconnect
    depends_on:
      - redis
      - mongo
    restart: unless-stopped
    networks:
      - careerconnect
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G

  # Redis Cache
  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 2gb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - careerconnect

  # MongoDB
  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=careerconnect
    restart: unless-stopped
    networks:
      - careerconnect

volumes:
  redis-data:
  mongo-data:

networks:
  careerconnect:
    driver: bridge
