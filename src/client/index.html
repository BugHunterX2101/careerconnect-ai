  <body>
    <div id="root"></div>
    <script>
      // Suppress extension errors
      window.addEventListener('error', function(e) {
        if (e.message && (e.message.includes('extension') || e.message.includes('Video element'))) {
          e.preventDefault();
          return false;
        }
      });
      // Suppress console errors from extensions
      const originalConsoleError = console.error;
      console.error = function(...args) {
        const message = args.join(' ');
        if (message.includes('Video element') || message.includes('extension') || message.includes('content.js')) {
          return;
        }
        originalConsoleError.apply(console, args);
      };
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
